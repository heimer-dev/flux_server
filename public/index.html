<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flux</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ── AUTH SCREEN ─────────────────────────────────────────────────────── -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="24" fill="#5b6af8"/>
        <path d="M14 20h12M14 24h8M14 28h10M26 20l8 4-8 4V20z" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Flux</span>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Anmelden</button>
      <button class="tab-btn" data-tab="register">Registrieren</button>
    </div>

    <!-- Login -->
    <form id="login-form" class="auth-form">
      <label>Benutzername
        <input type="text" id="login-username" autocomplete="username" placeholder="benutzername" required />
      </label>
      <label>Passwort
        <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" required />
      </label>
      <div id="login-error" class="auth-error"></div>
      <button type="submit" class="btn-primary">Anmelden</button>
    </form>

    <!-- Register -->
    <form id="register-form" class="auth-form hidden">
      <label>Benutzername
        <input type="text" id="reg-username" autocomplete="username" placeholder="benutzername (3–32 Zeichen)" required />
      </label>
      <label>Anzeigename
        <input type="text" id="reg-displayname" placeholder="Dein Name" required />
      </label>
      <label>Passwort
        <input type="password" id="reg-password" autocomplete="new-password" placeholder="Mindestens 8 Zeichen" required />
      </label>
      <div id="reg-error" class="auth-error"></div>
      <button type="submit" class="btn-primary">Konto erstellen</button>
    </form>
  </div>
</div>

<!-- ── APP SCREEN ──────────────────────────────────────────────────────── -->
<div id="app-screen" class="app-screen hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <header class="sidebar-header">
      <div class="my-avatar" id="my-avatar"></div>
      <span class="my-name" id="my-name"></span>
      <div class="sidebar-actions">
        <button class="icon-btn" id="new-chat-btn" title="Neuer Chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
        <button class="icon-btn" id="logout-btn" title="Abmelden">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="search-bar">
      <input type="text" id="chat-search" placeholder="Chats durchsuchen…" />
    </div>

    <div id="chat-list" class="chat-list"></div>
  </aside>

  <!-- Main panel -->
  <main class="main-panel">
    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <svg width="64" height="64" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="24" fill="#23263a"/>
        <path d="M14 20h12M14 24h8M14 28h10M26 20l8 4-8 4V20z" stroke="#5b6af8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Wähle einen Chat oder starte einen neuen</p>
    </div>

    <!-- Chat view -->
    <div id="chat-view" class="chat-view hidden">
      <header class="chat-header">
        <button class="icon-btn back-btn hidden" id="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="chat-avatar" id="chat-avatar"></div>
        <div class="chat-header-info">
          <span class="chat-header-name" id="chat-header-name"></span>
          <span class="chat-header-sub" id="chat-header-sub"></span>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn danger-btn" id="delete-chat-btn" title="Chat löschen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </header>

      <div id="messages-area" class="messages-area">
        <div id="load-more-btn-wrap" class="load-more-wrap hidden">
          <button id="load-more-btn" class="btn-ghost">Ältere Nachrichten</button>
        </div>
        <div id="messages-list" class="messages-list"></div>
        <div id="typing-indicator" class="typing-indicator hidden">
          <span class="typing-dots"><span></span><span></span><span></span></span>
          <span id="typing-text"></span>
        </div>
      </div>

      <footer class="message-input-area">
        <button class="icon-btn attach-btn" id="attach-btn" title="Datei senden">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.9a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <input type="file" id="file-input" accept="image/jpeg,image/png,audio/mpeg,audio/m4a" class="hidden" />
        <textarea id="message-input" placeholder="Nachricht schreiben…" rows="1"></textarea>
        <button class="send-btn" id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </footer>
    </div>
  </main>
</div>

<!-- ── NEW CHAT MODAL ──────────────────────────────────────────────────── -->
<div id="new-chat-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2>Neuer Chat</h2>
      <button class="icon-btn" id="close-modal-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-tabs">
      <button class="tab-btn active" data-modal-tab="direct">Direktnachricht</button>
      <button class="tab-btn" data-modal-tab="group">GruppenChat</button>
    </div>

    <!-- Direct -->
    <div id="direct-tab" class="modal-tab-content">
      <input type="text" id="user-search-input" placeholder="Benutzername suchen…" />
      <div id="user-search-results" class="user-search-results"></div>
    </div>

    <!-- Group -->
    <div id="group-tab" class="modal-tab-content hidden">
      <input type="text" id="group-name-input" placeholder="Gruppenname" />
      <input type="text" id="group-member-search" placeholder="Mitglieder suchen…" />
      <div id="group-search-results" class="user-search-results"></div>
      <div id="selected-members" class="selected-members"></div>
      <button class="btn-primary" id="create-group-btn">Gruppe erstellen</button>
    </div>
  </div>
</div>

<!-- ── CONFIRM MODAL ──────────────────────────────────────────────────── -->
<div id="confirm-modal" class="modal-overlay hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="confirm-title">Bestätigen</h2>
    </div>
    <p id="confirm-text" class="confirm-text"></p>
    <div class="modal-actions">
      <button class="btn-ghost" id="confirm-cancel">Abbrechen</button>
      <button class="btn-danger" id="confirm-ok">Löschen</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
